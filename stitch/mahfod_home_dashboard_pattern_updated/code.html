<style>body {
    background-color: #0d0e10;
    color: #fdfbfe;
    font-family: "Inter", sans-serif;
    overflow-x: hidden
    }
.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px) saturate(150%);
    border-top: 1px solid rgba(255, 255, 255, 0.1)
    }
.neon-glow {
    box-shadow: 0 0 20px rgba(204, 255, 0, 0.15)
    }
.orb-blur {
    filter: blur(80px);
    background: radial-gradient(circle, rgba(202, 243, 0, 0.15) 0%, rgba(13, 14, 16, 0) 70%)
    }
.pulse-orb {
    animation: pulse-glow 8s infinite ease-in-out;
    filter: blur(100px);
    background: radial-gradient(circle, rgba(204, 255, 0, 0.25) 0%, rgba(204, 255, 0, 0) 70%)
    }
@keyframes pulse-glow {
    0%, 100% {
        opacity: 0.4;
        transform: translate(-50%, -50%) scale(1);
        } 50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.2);
        }
    }
.andalusian-pattern {
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0ugFNCuUBQfWuJmS8DPolKh4k018l97d92a-7AnmQksqTgaXMhZb5t_9DBkJgr_a1oEzlPKvp8ui2YNAsF7ozJoPgm8erUzimiLhxlleGR1NUjBE33vVGwKwSJd9wSx9uxGdZzcnbxlcilw0zCeREEmfkVWk-ZVS7mpO_SVPcR3phUkU533WbgDsjpj4St8Jp74EBYY5HFiQoqz2H2pO3tPR4L02TLOWCYGbn0r8cbW0A51VN4l4mEGT6XQYeekJzZdUxU4jR3E);
    background-size: 300px;
    background-repeat: repeat
    }
.cyber-grid {
    position: relative
    }
.cyber-grid::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0ugFNCuUBQfWuJmS8DPolKh4k018l97d92a-7AnmQksqTgaXMhZb5t_9DBkJgr_a1oEzlPKvp8ui2YNAsF7ozJoPgm8erUzimiLhxlleGR1NUjBE33vVGwKwSJd9wSx9uxGdZzcnbxlcilw0zCeREEmfkVWk-ZVS7mpO_SVPcR3phUkU533WbgDsjpj4St8Jp74EBYY5HFiQoqz2H2pO3tPR4L02TLOWCYGbn0r8cbW0A51VN4l4mEGT6XQYeekJzZdUxU4jR3E);

    filter: brightness(0) saturate(100%) invert(88%) sepia(87%) font-weight(900) hue-rotate(20deg) brightness(107%) contrast(106%)
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
body {
    min-height: max(884px, 100dvh)

<body class="bg-background min-h-screen pb-44">
<!-- TopAppBar -->

<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest border border-white/10 flex items-center justify-center overflow-hidden">

</div>
<span class="font-['Inter'] font-black tracking-tighter text-2xl text-[#CCFF00]">MAHFOD</span>
</div>
<button class="text-[#fdfbfe]/60 hover:bg-white/5 transition-all p-2 rounded-xl active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#CCFF00]">settings</span>
</button>
</header>
<main class="relative px-6 pt-8 max-w-2xl mx-auto">
<!-- Background Visuals -->
<div class="absolute inset-x-0 top-0 h-[600px] cyber-grid -z-10 pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] pulse-orb -z-20 pointer-events-none"></div>
<div class="absolute -top-20 left-1/2 -translate-x-1/2 w-80 h-80 orb-blur -z-10 rounded-full"></div>
<!-- User Greeting Section (RTL Optimized for Arabic context) -->
<section class="mb-10 text-right" dir="rtl">
<h2 class="font-arabic font-black text-4xl mb-2 text-on-surface">السلام عليكم، أحمد</h2>
<p class="font-arabic text-on-surface-variant text-lg">مرحباً بك في مرصدك الروحي اليومي.</p>
</section>
<!-- Stat Banner Card -->
<section class="relative mb-8">
<!-- Pulsing neon orb specifically placed behind this card -->
<div class="absolute inset-0 w-full h-full bg-[#CCFF00]/5 blur-[60px] rounded-full scale-110 -z-10 animate-pulse"></div>
<div class="glass-card rounded-[32px] p-8 relative overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<!-- Islamic Geometric Pattern Overlay from DATA:IMAGE:IMAGE_6 -->
<div class="absolute inset-0 pointer-events-none opacity-[0.08] mix-blend-overlay" style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0ugFNCuUBQfWuJmS8DPolKh4k018l97d92a-7AnmQksqTgaXMhZb5t_9DBkJgr_a1oEzlPKvp8ui2YNAsF7ozJoPgm8erUzimiLhxlleGR1NUjBE33vVGwKwSJd9wSx9uxGdZzcnbxlcilw0zCeREEmfkVWk-ZVS7mpO_SVPcR3phUkU533WbgDsjpj4St8Jp74EBYY5HFiQoqz2H2pO3tPR4L02TLOWCYGbn0r8cbW0A51VN4l4mEGT6XQYeekJzZdUxU4jR3E'); background-size: 200px; filter: brightness(0) saturate(100%) invert(88%) sepia(87%) font-weight(900) hue-rotate(20deg) brightness(107%) contrast(106%);"></div>
<div class="flex justify-between items-center relative z-10 text-center">
<div class="flex-1">
<div class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2">Total Memos</div>
<div class="text-[34px] font-black text-[#CCFF00] leading-none">128</div>
</div>
<div class="w-px h-12 bg-white/10"></div>
<div class="flex-1">
<div class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2">Quran Progress</div>
<div class="text-[34px] font-black text-[#CCFF00] leading-none">64%</div>
</div>
<div class="w-px h-12 bg-white/10"></div>
<div class="flex-1">
<div class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2">Current Streak</div>
<div class="text-[34px] font-black text-[#CCFF00] leading-none">12</div>
</div>
</div>
</div>
</section>
<!-- Action Grid -->
<section class="grid grid-cols-2 gap-4 mb-12">
<button class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center gap-4 hover:bg-white/5 transition-all active:scale-95 duration-200 group border-b-2 border-transparent hover:border-[#CCFF00]/40">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl">library_add</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Add Book</span>
</button>
<button class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center gap-4 hover:bg-white/5 transition-all active:scale-95 duration-200 group border-b-2 border-transparent hover:border-[#CCFF00]/40">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl">note_add</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Add Note</span>
</button>
<button class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center gap-4 hover:bg-white/5 transition-all active:scale-95 duration-200 group border-b-2 border-transparent hover:border-[#CCFF00]/40">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl">history_edu</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Add Memo</span>
</button>
<button class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center gap-4 hover:bg-white/5 transition-all active:scale-95 duration-200 group border-b-2 border-transparent hover:border-[#CCFF00]/40">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl">menu_book</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Update Quran</span>

</section>
<!-- Featured Section -->
<section class="mb-20">

</div>
<div class="w-12 h-12 rounded-full border-2 border-[#CCFF00]/20 flex items-center justify-center relative">
<div class="absolute inset-0 rounded-full border-2 border-[#CCFF00] border-t-transparent -rotate-45"></div>
<span class="text-[10px] font-bold">85%</span>
</div>
</div>
</div>
</section>
</main>
<!-- Floating Action Button (Highlighter) -->
<div class="fixed bottom-32 left-1/2 -translate-x-1/2 z-[60]">
<button class="w-16 h-16 rounded-full bg-gradient-to-br from-[#f3ffca] to-[#CCFF00] flex items-center justify-center text-[#0d0e10] shadow-[0_0_30px_rgba(204,255,0,0.4)] active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'wght' 600;">add</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-50 flex justify-around items-center px-8 py-4 bg-[#0d0e10]/60 backdrop-blur-3xl rounded-[40px] border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5),0_0_30px_rgba(204,255,0,0.1)]">

<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Home</span>
</a>
<!-- Quran -->
